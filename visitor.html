<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>방문자 정보 — KAIC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

  <header class="page-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <span class="page-title">방문자 정보</span>
    <span class="category-badge" id="catBadge"></span>
  </header>

  <div class="page-body">

    <div class="tab-group">
      <button class="tab-btn active" id="tab-camera" onclick="switchTab('camera')">📷 명함/명찰 촬영</button>
      <button class="tab-btn" id="tab-manual" onclick="switchTab('manual')">✏️ 직접 입력</button>
    </div>

    <!-- 카메라 탭 -->
    <div class="tab-panel active" id="panel-camera">

      <div class="camera-area" id="cameraArea" onclick="document.getElementById('fileInput').click()">
        <div class="camera-placeholder">
          <span>📷</span>
          <span>명함 또는 명찰을 촬영하거나 이미지를 선택하세요</span>
          <span style="font-size:0.75rem; margin-top:4px; opacity:0.6;">탭하여 카메라 열기</span>
        </div>
        <img id="previewImg" alt="촬영 이미지">
      </div>

      <input
        type="file"
        id="fileInput"
        accept="image/*"
        capture="environment"
        style="display:none"
        onchange="handleImage(this)"
      >

      <button class="btn btn-ghost btn-full" id="ocrBtn" onclick="runOCR()" disabled style="margin-bottom:12px;">
        🔍 텍스트 인식 (OCR)
      </button>

      <p class="section-title">OCR 인식 결과</p>
      <div class="ocr-result" id="ocrResult">
        이미지를 선택하면 여기에 인식된 텍스트가 표시됩니다.
      </div>

      <p style="font-size:0.75rem; color:var(--text-muted); margin-bottom:16px;">
        ※ OCR 결과를 확인 후 아래 양식에서 수정·보완하세요.
      </p>

    </div>

    <!-- 수기 입력 탭 -->
    <div class="tab-panel" id="panel-manual"></div>

    <!-- 공통 입력 양식 -->
    <div id="formSection">
      <p class="section-title">방문자 정보</p>

      <div class="form-group">
        <label class="form-label" for="vName">이름</label>
        <input class="form-input" type="text" id="vName" placeholder="홍길동">
      </div>

      <div class="form-group">
        <label class="form-label" for="vOrg">기관 / 기업명</label>
        <input class="form-input" type="text" id="vOrg" placeholder="한국인공지능검증원">
      </div>

      <div class="form-group">
        <label class="form-label" for="vTitle">직책</label>
        <input class="form-input" type="text" id="vTitle" placeholder="팀장">
      </div>

      <div class="form-group">
        <label class="form-label" for="vContact">연락처</label>
        <input class="form-input" type="tel" id="vContact" placeholder="010-0000-0000">
      </div>
    </div>

    <button class="btn btn-primary btn-full" style="margin-top:8px;" onclick="goNext()">
      완료 →
    </button>

  </div>

</div>

<!-- 로딩 오버레이 -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p class="overlay-msg" id="overlayMsg">OCR 처리 중...</p>
</div>

<script type="module">
  import { getSession, setVisitor } from './js/store.js';

  const session = getSession();
  if (!session.category) { window.location.href = 'index.html'; }

  const catColors = {
    verification: 'var(--cat-1)',
    consulting: 'var(--cat-2)',
    development: 'var(--cat-3)',
    collaboration: 'var(--cat-4)',
    etc: 'var(--cat-5)'
  };
  const badge = document.getElementById('catBadge');
  badge.textContent = session.categoryLabel;
  badge.style.background = catColors[session.category] || 'var(--cat-5)';
  badge.style.color = '#fff';

  // 기존 방문자 정보 복원
  const v = session.visitor || {};
  if (v.name) document.getElementById('vName').value = v.name;
  if (v.org) document.getElementById('vOrg').value = v.org;
  if (v.title) document.getElementById('vTitle').value = v.title;
  if (v.contact) document.getElementById('vContact').value = v.contact;

  // 탭 전환
  window.switchTab = function(tab) {
    ['camera', 'manual'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
      document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
    });
  };

  // 이미지 선택
  let selectedFile = null;

  window.handleImage = function(input) {
    const file = input.files[0];
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('previewImg');
      img.src = e.target.result;
      document.getElementById('cameraArea').classList.add('has-image');
      document.getElementById('ocrBtn').disabled = false;
    };
    reader.readAsDataURL(file);
  };

  // Tesseract OCR
  window.runOCR = async function() {
    if (!selectedFile) return;
    showOverlay('OCR 처리 중... (최초 1회 모델 로딩)');

    try {
      const { createWorker } = await import(
        'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.esm.min.js'
      );
      const worker = await createWorker(['kor', 'eng']);
      const { data: { text } } = await worker.recognize(selectedFile);
      await worker.terminate();

      const cleaned = text.trim().replace(/\n{3,}/g, '\n\n');
      document.getElementById('ocrResult').textContent = cleaned || '인식된 텍스트가 없습니다.';

      // OCR 결과에서 간단히 이름/기관 파싱 시도
      autoFillFromOCR(cleaned);
    } catch (e) {
      document.getElementById('ocrResult').textContent = 'OCR 실패: ' + e.message;
    } finally {
      hideOverlay();
    }
  };

  function autoFillFromOCR(text) {
    // 연락처 패턴 추출
    const phoneMatch = text.match(/0\d{1,2}[-.\s]?\d{3,4}[-.\s]?\d{4}/);
    if (phoneMatch && !document.getElementById('vContact').value) {
      document.getElementById('vContact').value = phoneMatch[0].replace(/\s/g, '-');
    }
    // 이메일 패턴 추출 (연락처 필드에 없으면 추가)
    const emailMatch = text.match(/[\w.-]+@[\w.-]+\.\w+/);
    if (emailMatch && !document.getElementById('vContact').value) {
      document.getElementById('vContact').value = emailMatch[0];
    }
  }

  window.goNext = function() {
    setVisitor({
      name: document.getElementById('vName').value.trim(),
      org: document.getElementById('vOrg').value.trim(),
      title: document.getElementById('vTitle').value.trim(),
      contact: document.getElementById('vContact').value.trim()
    });
    window.location.href = 'complete.html';
  };

  function showOverlay(msg) {
    document.getElementById('overlayMsg').textContent = msg;
    document.getElementById('overlay').classList.add('show');
  }

  function hideOverlay() {
    document.getElementById('overlay').classList.remove('show');
  }
</script>

</body>
</html>
