<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>상담 인터뷰 — KAIC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

  <header class="page-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <span class="page-title">상담 인터뷰</span>
    <span class="cat-badge" id="catBadge"></span>
  </header>

  <div class="interview-body">

    <div class="rec-timer" id="timer">00:00</div>

    <button class="rec-button idle" id="recBtn" onclick="handleRec()">
      <span class="rec-icon" id="recIcon">⏺</span>
      <span class="rec-label" id="recLabel">녹음 시작</span>
    </button>

    <p class="rec-hint" id="recHint">
      버튼을 눌러 녹음을 시작하세요<br>
      <span style="opacity:0.5;font-size:0.72rem;">상담 종료 후 다시 누르면 자동 변환됩니다</span>
    </p>

  </div>

</div>

<!-- 로딩 오버레이 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p class="loading-msg" id="loadingMsg">Whisper 모델 로딩 중...</p>
</div>

<script type="module">
  import { getSession, setTranscript, CAT_COLORS } from './js/store.js';

  const session = getSession();
  if (!session.category) { location.href = 'index.html'; }

  // 배지
  const badge = document.getElementById('catBadge');
  badge.textContent = session.categoryLabel;
  badge.style.background = CAT_COLORS[session.category] || 'var(--cat-5)';

  // ── 상태 ──
  let state = 'idle'; // idle | recording | processing
  let mediaRecorder = null;
  let audioChunks = [];
  let audioBlob = null;
  let timerInterval = null;
  let seconds = 0;
  let whisperPipeline = null;
  let whisperLoading = false;

  // ── Whisper 사전 로드 ──
  async function loadWhisper() {
    if (whisperPipeline) return whisperPipeline;
    if (whisperLoading) return null;
    whisperLoading = true;
    showLoading('Whisper 모델 로딩 중... (최초 1회)');
    try {
      const { pipeline } = await import(
        'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js'
      );
      whisperPipeline = await pipeline('automatic-speech-recognition', 'Xenova/whisper-base', {
        language: 'korean', task: 'transcribe'
      });
      hideLoading();
      return whisperPipeline;
    } catch(e) {
      hideLoading();
      alert('모델 로딩 실패: ' + e.message);
      whisperLoading = false;
      return null;
    }
  }

  // 페이지 진입 시 사전 로드 시작 (백그라운드)
  loadWhisper();

  // ── 녹음 핸들러 ──
  window.handleRec = async () => {
    if (state === 'idle') await startRec();
    else if (state === 'recording') await stopAndConvert();
  };

  async function startRec() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start();
      state = 'recording';
      setUI('recording');
      startTimer();
    } catch(e) {
      alert('마이크 접근 실패: ' + e.message);
    }
  }

  async function stopAndConvert() {
    if (!mediaRecorder) return;
    state = 'processing';
    setUI('processing');
    stopTimer();

    await new Promise(resolve => {
      mediaRecorder.onstop = resolve;
      mediaRecorder.stop();
      mediaRecorder.stream?.getTracks().forEach(t => t.stop());
    });

    audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

    const pipe = await loadWhisper();
    if (!pipe) { state = 'idle'; setUI('idle'); return; }

    showLoading('음성 변환 중...');
    try {
      const arrayBuffer = await audioBlob.arrayBuffer();
      const ctx = new AudioContext({ sampleRate: 16000 });
      const decoded = await ctx.decodeAudioData(arrayBuffer);
      const float32 = decoded.getChannelData(0);

      const result = await pipe(float32, {
        language: 'korean', task: 'transcribe',
        chunk_length_s: 30, stride_length_s: 5
      });

      setTranscript(result.text.trim());
      hideLoading();
      location.href = 'review.html';
    } catch(e) {
      hideLoading();
      alert('변환 실패: ' + e.message);
      state = 'idle';
      setUI('idle');
    }
  }

  // ── UI 상태 ──
  function setUI(s) {
    const btn = document.getElementById('recBtn');
    const icon = document.getElementById('recIcon');
    const label = document.getElementById('recLabel');
    const hint = document.getElementById('recHint');
    const timer = document.getElementById('timer');

    btn.className = `rec-button ${s}`;

    if (s === 'idle') {
      icon.textContent = '⏺';
      label.textContent = '녹음 시작';
      hint.innerHTML = '버튼을 눌러 녹음을 시작하세요<br><span style="opacity:0.5;font-size:0.72rem;">상담 종료 후 다시 누르면 자동 변환됩니다</span>';
      timer.classList.remove('show');
    } else if (s === 'recording') {
      icon.textContent = '⏹';
      label.textContent = '상담 종료';
      hint.innerHTML = '<span style="color:var(--danger)">녹음 중...</span><br><span style="opacity:0.5;font-size:0.72rem;">상담이 끝나면 버튼을 다시 누르세요</span>';
      timer.classList.add('show');
    } else if (s === 'processing') {
      icon.textContent = '⏳';
      label.textContent = '변환 중...';
      hint.textContent = '잠시만 기다려주세요';
      timer.classList.remove('show');
    }
  }

  // ── 타이머 ──
  function startTimer() {
    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds/60)).padStart(2,'0');
      const s = String(seconds%60).padStart(2,'0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
  }

  // ── 로딩 ──
  function showLoading(msg) {
    document.getElementById('loadingMsg').textContent = msg;
    document.getElementById('loadingOverlay').classList.add('show');
  }
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('show');
  }
</script>

</body>
</html>
