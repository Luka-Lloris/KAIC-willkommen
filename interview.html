<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>상담 인터뷰 — KAIC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

  <header class="page-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <span class="page-title">상담 인터뷰</span>
    <span class="cat-badge" id="catBadge"></span>
  </header>

  <div class="interview-body">

    <div class="rec-timer" id="timer">00:00</div>

    <!-- 동심원 버튼 -->
    <div class="rec-ring-wrap idle" id="recWrap" onclick="handleRec()">
      <div class="rec-ring-outer"></div>
      <div class="rec-ring-mid"></div>
      <div class="rec-core" id="recCore">🎙️</div>
    </div>

    <p class="rec-hint" id="recHint">
      버튼을 눌러 녹음을 시작하세요<br>
      <span style="opacity:0.5;font-size:0.72rem;">상담 종료 후 다시 누르면 자동 변환됩니다</span>
    </p>

  </div>

</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p class="loading-msg" id="loadingMsg">Whisper 모델 로딩 중...</p>
</div>

<script type="module">
  import { getSession, addTranscript, CAT_COLORS } from './js/store.js';

  const session = getSession();
  if (!session.category) { location.href = 'index.html'; }

  const badge = document.getElementById('catBadge');
  badge.textContent = session.categoryLabel;
  badge.style.background = CAT_COLORS[session.category] || 'var(--cat-5)';

  let state = 'idle';
  let mediaRecorder = null;
  let audioChunks = [];
  let timerInterval = null;
  let seconds = 0;
  let whisperPipeline = null;
  let whisperLoading = false;

  // 백그라운드 사전 로드
  preloadWhisper();

  async function preloadWhisper() {
    if (whisperPipeline || whisperLoading) return;
    whisperLoading = true;
    try {
      const { pipeline } = await import(
        'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js'
      );
      whisperPipeline = await pipeline('automatic-speech-recognition', 'Xenova/whisper-small', {
        language: 'korean', task: 'transcribe'
      });
    } catch(e) {
      whisperLoading = false;
    }
  }

  async function ensureWhisper() {
    if (whisperPipeline) return whisperPipeline;
    showLoading('Whisper 모델 로딩 중... (최초 1회, 약 466MB)');
    try {
      const { pipeline } = await import(
        'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js'
      );
      whisperPipeline = await pipeline('automatic-speech-recognition', 'Xenova/whisper-small', {
        language: 'korean', task: 'transcribe'
      });
      hideLoading();
      return whisperPipeline;
    } catch(e) {
      hideLoading();
      alert('모델 로딩 실패: ' + e.message);
      return null;
    }
  }

  window.handleRec = async () => {
    if (state === 'idle') await startRec();
    else if (state === 'recording') await stopAndConvert();
  };

  async function startRec() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start();
      state = 'recording';
      setUI('recording');
      startTimer();
    } catch(e) {
      alert('마이크 접근 실패: ' + e.message);
    }
  }

  async function stopAndConvert() {
    state = 'processing';
    setUI('processing');
    stopTimer();

    await new Promise(resolve => {
      mediaRecorder.onstop = resolve;
      mediaRecorder.stop();
      mediaRecorder.stream?.getTracks().forEach(t => t.stop());
    });

    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
    const pipe = await ensureWhisper();
    if (!pipe) { state = 'idle'; setUI('idle'); return; }

    showLoading('음성 변환 중...');
    try {
      const arrayBuffer = await audioBlob.arrayBuffer();
      const ctx = new AudioContext({ sampleRate: 16000 });
      const decoded = await ctx.decodeAudioData(arrayBuffer);
      const float32 = decoded.getChannelData(0);

      const result = await pipe(float32, {
        language: 'korean', task: 'transcribe',
        chunk_length_s: 30, stride_length_s: 5
      });

      addTranscript(result.text.trim());
      hideLoading();
      location.href = 'review.html';
    } catch(e) {
      hideLoading();
      alert('변환 실패: ' + e.message);
      state = 'idle';
      setUI('idle');
    }
  }

  function setUI(s) {
    const wrap = document.getElementById('recWrap');
    const core = document.getElementById('recCore');
    const hint = document.getElementById('recHint');
    const timer = document.getElementById('timer');

    wrap.className = `rec-ring-wrap ${s}`;

    if (s === 'idle') {
      core.textContent = '🎙️';
      hint.innerHTML = '버튼을 눌러 녹음을 시작하세요<br><span style="opacity:0.5;font-size:0.72rem;">상담 종료 후 다시 누르면 자동 변환됩니다</span>';
      timer.classList.remove('show');
    } else if (s === 'recording') {
      core.textContent = '⏹';
      hint.innerHTML = '<span style="color:var(--danger);font-weight:600;">녹음 중</span><br><span style="opacity:0.5;font-size:0.72rem;">종료하려면 버튼을 다시 누르세요</span>';
      timer.classList.add('show');
    } else if (s === 'processing') {
      core.textContent = '⏳';
      hint.textContent = '음성을 텍스트로 변환하고 있습니다...';
      timer.classList.remove('show');
    }
  }

  function startTimer() {
    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds/60)).padStart(2,'0');
      const s = String(seconds%60).padStart(2,'0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopTimer() { clearInterval(timerInterval); }

  function showLoading(msg) {
    document.getElementById('loadingMsg').textContent = msg;
    document.getElementById('loadingOverlay').classList.add('show');
  }
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('show');
  }
</script>

</body>
</html>
