<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>KAIC 부스 상담</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="welcome-header">
  <span class="logo">KAIC</span>
  <span class="clock" id="clock"></span>
</header>

<div class="welcome-wrap">
  <button class="welcome-btn" onclick="go('verification','시험/검증')">
    <span class="icon">🔬</span>
    <span class="label">시험<br>검증</span>
    <span class="bar"></span>
  </button>
  <button class="welcome-btn" onclick="go('consulting','컨설팅')">
    <span class="icon">💼</span>
    <span class="label">컨설팅</span>
    <span class="bar"></span>
  </button>
  <button class="welcome-btn" onclick="go('development','개발지원')">
    <span class="icon">⚙️</span>
    <span class="label">개발<br>지원</span>
    <span class="bar"></span>
  </button>
  <button class="welcome-btn" onclick="go('collaboration','협업제안')">
    <span class="icon">🤝</span>
    <span class="label">협업<br>제안</span>
    <span class="bar"></span>
  </button>
  <button class="welcome-btn" onclick="go('etc','기타')">
    <span class="icon">📋</span>
    <span class="label">기타</span>
    <span class="bar"></span>
  </button>
</div>

<script type="module">
  import { initSession } from './js/store.js';

  window.go = (cat, label) => {
    initSession(cat, label);
    location.href = 'interview.html';
  };

  const tick = () => {
    const d = new Date();
    const p = n => String(n).padStart(2,'0');
    document.getElementById('clock').textContent =
      `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  };
  tick();
  setInterval(tick, 10000);
</script>
</body>
</html>
