<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>상담 완료 — KAIC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

  <header class="page-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <span class="page-title">상담 완료</span>
    <span class="category-badge" id="catBadge"></span>
  </header>

  <div class="page-body">

    <div class="complete-card">
      <h3>상담 기록 미리보기</h3>
      <pre id="mdPreview"></pre>
    </div>

    <div class="action-row">
      <button class="btn btn-ghost" onclick="downloadMD()">
        ⬇️ MD 다운로드
      </button>
      <button class="btn btn-primary" id="sendBtn" onclick="sendEmail()">
        📧 이메일 발송
      </button>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <button class="btn btn-success btn-full" style="margin-top:20px;" onclick="goHome()">
      ✅ 완료 — 새 상담 시작
    </button>

  </div>

</div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p class="overlay-msg">이메일 발송 중...</p>
</div>

<script type="module">
  import { getSession, generateMD, generateFilename, clearSession } from './js/store.js';
  import { sendEmail as resendEmail } from './js/resend.js';

  const session = getSession();
  if (!session.category) { window.location.href = 'index.html'; }

  const catColors = {
    verification: 'var(--cat-1)',
    consulting: 'var(--cat-2)',
    development: 'var(--cat-3)',
    collaboration: 'var(--cat-4)',
    etc: 'var(--cat-5)'
  };
  const badge = document.getElementById('catBadge');
  badge.textContent = session.categoryLabel;
  badge.style.background = catColors[session.category] || 'var(--cat-5)';
  badge.style.color = '#fff';

  const md = generateMD();
  const filename = generateFilename();

  document.getElementById('mdPreview').textContent = md;

  window.downloadMD = function() {
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    showStatus('success', `📥 ${filename} 다운로드 완료`);
  };

  window.sendEmail = async function() {
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    document.getElementById('overlay').classList.add('show');

    try {
      const v = session.visitor || {};
      const visitorName = v.name || '방문자';
      const subject = `[KAIC 부스 상담] ${session.categoryLabel} — ${visitorName} (${session.datetime || ''})`;

      await resendEmail({ subject, markdown: md, filename });

      showStatus('success', `✅ ${subject} 발송 완료`);
    } catch (e) {
      showStatus('error', `❌ 발송 실패: ${e.message}`);
      btn.disabled = false;
    } finally {
      document.getElementById('overlay').classList.remove('show');
    }
  };

  window.goHome = function() {
    clearSession();
    window.location.href = 'index.html';
  };

  function showStatus(type, msg) {
    const el = document.getElementById('statusMsg');
    el.className = `status-msg show ${type}`;
    el.textContent = msg;
  }
</script>

</body>
</html>
