<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>상담 내용 확인 — KAIC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

  <header class="page-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <span class="page-title">상담 내용 확인</span>
    <button class="visitor-btn" id="visitorBtn" onclick="openVisitorModal()">
      👤 방문자 정보
    </button>
    <span class="cat-badge" id="catBadge"></span>
  </header>

  <div class="review-body">

    <div id="prevTranscripts"></div>

    <div class="transcript-latest">
      <p class="transcript-latest-label" id="latestLabel">1회차 상담 내용</p>
      <textarea class="review-textarea" id="latestTextarea" placeholder="변환된 내용이 없습니다. 직접 입력하세요."></textarea>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <button class="send-btn" id="sendBtn" onclick="sendEmail()">
      📧 메일로 전송
    </button>

    <div class="bottom-row">
      <button class="done-btn" id="doneBtn" onclick="goHome()">✅ 완료 — 새 상담</button>
      <button class="continue-btn" onclick="continueConsult()">🎙 상담 이어가기</button>
    </div>

  </div>
</div>

<!-- 방문자 선택 팝업 -->
<div class="modal-bg" id="visitorModal" onclick="closeIfBg(event,'visitorModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <p class="modal-title">방문자 정보 입력</p>
    <div class="modal-row">
      <button class="modal-choice-btn" onclick="openCamera()">
        <span>📷</span><span>명함/명찰 촬영</span>
      </button>
      <button class="modal-choice-btn" onclick="openManual()">
        <span>✏️</span><span>직접 입력</span>
      </button>
    </div>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleCameraInput(this)">
  </div>
</div>

<!-- 수동 입력 팝업 -->
<div class="modal-bg" id="manualModal" onclick="closeIfBg(event,'manualModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <p class="modal-title">방문자 정보</p>
    <div class="form-group">
      <label class="form-label">기관 / 기업명</label>
      <input class="form-input" type="text" id="vOrg" placeholder="한국인공지능검증원">
    </div>
    <div class="form-group">
      <label class="form-label">이름</label>
      <input class="form-input" type="text" id="vName" placeholder="홍길동">
    </div>
    <div class="form-group">
      <label class="form-label">전화번호</label>
      <input class="form-input" type="tel" id="vContact" placeholder="010-0000-0000">
    </div>
    <div class="form-group">
      <label class="form-label">이메일</label>
      <input class="form-input" type="email" id="vEmail" placeholder="example@company.com">
    </div>
    <button class="modal-confirm-btn" onclick="saveManual()">확인</button>
  </div>
</div>

<div class="loading-overlay" id="ocrOverlay">
  <div class="spinner"></div>
  <p class="loading-msg">명함 인식 중...</p>
</div>
<div class="loading-overlay" id="sendOverlay">
  <div class="spinner"></div>
  <p class="loading-msg" id="sendMsg">처리 중...</p>
</div>

<script type="module">
  import {
    getSession, updateTranscript, setVisitor,
    hasVisitor, generateMD, generateFilename,
    clearSession, CAT_COLORS
  } from './js/store.js';
  import { sendEmail as resendSend } from './js/resend.js';
  import { saveConsultation } from './js/supabase.js';

  const session = getSession();
  if (!session.category) { location.href = 'index.html'; }

  const badge = document.getElementById('catBadge');
  badge.textContent = session.categoryLabel;
  badge.style.background = CAT_COLORS[session.category] || 'var(--cat-5)';

  const transcripts = session.transcripts || [];
  const total = transcripts.length;
  const prevContainer = document.getElementById('prevTranscripts');
  const latestTextarea = document.getElementById('latestTextarea');
  const latestLabel = document.getElementById('latestLabel');

  // 이전 회차들 (접힌 상태)
  transcripts.slice(0, -1).forEach((text, i) => {
    const block = document.createElement('div');
    block.className = 'transcript-block';
    block.innerHTML = `
      <div class="transcript-header" onclick="toggleBlock(${i})">
        <div class="transcript-header-left">
          <span class="transcript-round-label">${i+1}회차</span>
          <span class="transcript-preview">${text.slice(0,40)}${text.length>40?'…':''}</span>
        </div>
        <span class="transcript-toggle" id="toggle-${i}">▼</span>
      </div>
      <div class="transcript-content" id="content-${i}">
        <textarea class="transcript-textarea" onchange="savePrev(${i}, this.value)">${text}</textarea>
      </div>
    `;
    prevContainer.appendChild(block);
  });

  if (total > 0) {
    latestLabel.textContent = `${total}회차 상담 내용`;
    latestTextarea.value = transcripts[total - 1] || '';
  }

  window.toggleBlock = (i) => {
    document.getElementById(`content-${i}`).classList.toggle('open');
    document.getElementById(`toggle-${i}`).classList.toggle('open');
  };

  window.savePrev = (i, val) => updateTranscript(i, val);

  latestTextarea.addEventListener('change', () => {
    updateTranscript(total - 1, latestTextarea.value);
  });

  function updateVisitorBtn() {
    const btn = document.getElementById('visitorBtn');
    if (hasVisitor()) {
      const v = getSession().visitor;
      btn.textContent = `👤 ${v.name || v.org || '정보 입력됨'}`;
      btn.classList.add('has-data');
    } else {
      btn.textContent = '👤 방문자 정보';
      btn.classList.remove('has-data');
    }
  }
  updateVisitorBtn();

  window.openVisitorModal = () => {
    if (hasVisitor()) {
      const v = getSession().visitor;
      document.getElementById('vOrg').value = v.org || '';
      document.getElementById('vName').value = v.name || '';
      document.getElementById('vContact').value = v.contact || '';
      document.getElementById('vEmail').value = v.email || '';
      document.getElementById('manualModal').classList.add('show');
    } else {
      document.getElementById('visitorModal').classList.add('show');
    }
  };

  window.openCamera = () => {
    document.getElementById('visitorModal').classList.remove('show');
    document.getElementById('cameraInput').click();
  };

  window.openManual = () => {
    document.getElementById('visitorModal').classList.remove('show');
    document.getElementById('manualModal').classList.add('show');
  };

  window.closeIfBg = (e, id) => {
    if (e.target.classList.contains('modal-bg'))
      document.getElementById(id).classList.remove('show');
  };

  window.saveManual = () => {
    setVisitor({
      org:     document.getElementById('vOrg').value.trim(),
      name:    document.getElementById('vName').value.trim(),
      contact: document.getElementById('vContact').value.trim(),
      email:   document.getElementById('vEmail').value.trim()
    });
    document.getElementById('manualModal').classList.remove('show');
    updateVisitorBtn();
  };

  window.handleCameraInput = async (input) => {
    const file = input.files[0];
    if (!file) return;
    document.getElementById('ocrOverlay').classList.add('show');
    try {
      const { createWorker } = await import(
        'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.esm.min.js'
      );
      const worker = await createWorker(['kor','eng']);
      const { data: { text } } = await worker.recognize(file);
      await worker.terminate();
      const phone = text.match(/0\d{1,2}[-.\s]?\d{3,4}[-.\s]?\d{4}/);
      const email = text.match(/[\w.-]+@[\w.-]+\.\w+/);
      document.getElementById('vOrg').value = '';
      document.getElementById('vName').value = '';
      document.getElementById('vContact').value = phone ? phone[0].replace(/\s/g,'-') : '';
      document.getElementById('vEmail').value = email ? email[0] : '';
    } catch(e) {
      alert('OCR 실패: ' + e.message);
    } finally {
      document.getElementById('ocrOverlay').classList.remove('show');
      document.getElementById('manualModal').classList.add('show');
    }
  };

  // 메일 전송
  window.sendEmail = async () => {
    updateTranscript(total - 1, latestTextarea.value);
    const s = getSession();
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    document.getElementById('sendMsg').textContent = '메일 발송 중...';
    document.getElementById('sendOverlay').classList.add('show');
    try {
      const subject = `[KAIC 부스 상담] ${s.categoryLabel} — ${s.visitor?.name || '방문자'} (${s.datetime})`;
      await resendSend({ subject, markdown: generateMD(), filename: generateFilename() });
      showStatus('success', '✅ 메일 발송 완료');
    } catch(e) {
      showStatus('error', `❌ 발송 실패: ${e.message}`);
      btn.disabled = false;
    } finally {
      document.getElementById('sendOverlay').classList.remove('show');
    }
  };

  // 완료 — Supabase 저장
  window.goHome = async () => {
    updateTranscript(total - 1, latestTextarea.value);
    const btn = document.getElementById('doneBtn');
    btn.disabled = true;
    document.getElementById('sendMsg').textContent = '저장 중...';
    document.getElementById('sendOverlay').classList.add('show');
    try {
      await saveConsultation(getSession());
      clearSession();
      location.href = 'index.html';
    } catch(e) {
      showStatus('error', `❌ 저장 실패: ${e.message}`);
      btn.disabled = false;
      document.getElementById('sendOverlay').classList.remove('show');
    }
  };

  // 상담 이어가기
  window.continueConsult = () => {
    updateTranscript(total - 1, latestTextarea.value);
    location.href = 'interview.html?continue=1';
  };

  function showStatus(type, msg) {
    const el = document.getElementById('statusMsg');
    el.className = `status-msg show ${type}`;
    el.textContent = msg;
  }
</script>

</body>
</html>
