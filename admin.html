<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>KAIC 상담 기록 관리</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-login {
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; padding: 24px;
    }
    .admin-logo { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.1em; opacity: 0.5; margin-bottom: 8px; }
    .admin-title { font-size: 1.2rem; font-weight: 700; }
    .admin-input {
      width: 100%; max-width: 320px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 16px; color: var(--text);
      font-family: inherit; font-size: 1rem; outline: none;
      transition: border-color 0.2s; text-align: center; letter-spacing: 0.1em;
    }
    .admin-input:focus { border-color: var(--accent); }
    .admin-submit {
      width: 100%; max-width: 320px; padding: 14px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; font-family: inherit; font-size: 0.95rem;
      font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .admin-submit:hover { background: #3a7ae8; }
    .admin-err { font-size: 0.82rem; color: var(--danger); }

    /* 목록 */
    .admin-wrap { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .admin-header h1 { font-size: 1rem; font-weight: 700; }
    .admin-count { font-size: 0.78rem; color: var(--text-muted); }

    .record-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 12px; overflow: hidden;
    }
    .record-head {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; cursor: pointer;
    }
    .record-cat {
      font-size: 0.68rem; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; color: #fff; flex-shrink: 0;
    }
    .record-meta { flex: 1; min-width: 0; }
    .record-name { font-size: 0.88rem; font-weight: 600; }
    .record-org  { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }
    .record-date { font-size: 0.72rem; color: var(--text-muted); flex-shrink: 0; }
    .record-toggle { font-size: 0.72rem; color: var(--text-muted); flex-shrink: 0; transition: transform 0.25s; }
    .record-toggle.open { transform: rotate(180deg); }

    .record-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
    .record-body.open { display: block; }

    .record-visitor {
      display: flex; flex-wrap: wrap; gap: 6px 16px;
      padding: 10px 0; font-size: 0.78rem; color: var(--text-muted);
    }
    .record-visitor span { display: flex; gap: 4px; }
    .record-visitor strong { color: var(--text); }

    .record-transcript {
      background: var(--surface2); border-radius: 8px;
      padding: 12px; font-size: 0.85rem; line-height: 1.7;
      color: var(--text); white-space: pre-wrap; margin-top: 8px;
    }
    .record-round-label {
      font-size: 0.7rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; margin-top: 12px;
    }

    .empty-state {
      text-align: center; padding: 60px 24px;
      color: var(--text-muted); font-size: 0.88rem; line-height: 1.8;
    }
    .empty-state .emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: none; color: var(--text-muted); font-family: inherit;
      font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginScreen" class="admin-login">
  <p class="admin-logo">KAIC</p>
  <p class="admin-title">관리자 로그인</p>
  <input class="admin-input" type="password" id="pwInput" placeholder="비밀번호"
    onkeydown="if(event.key==='Enter') doLogin()">
  <button class="admin-submit" onclick="doLogin()">로그인</button>
  <p class="admin-err" id="loginErr"></p>
</div>

<!-- 기록 목록 -->
<div id="mainScreen" style="display:none;">
  <div class="admin-wrap">
    <div class="admin-header">
      <h1>📋 상담 기록</h1>
      <span class="admin-count" id="recordCount"></span>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:20px;">
      <button class="filter-btn active" id="tab-stt" onclick="switchTab('stt')">🎙 STT 상담 기록</button>
      <button class="filter-btn" id="tab-clt" onclick="switchTab('clt')">📋 CLT 상담 기록</button>
    </div>

    <div id="stt-section">
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('verification', this)">시험/검증</button>
      <button class="filter-btn" onclick="setFilter('consulting', this)">컨설팅</button>
      <button class="filter-btn" onclick="setFilter('development', this)">개발지원</button>
      <button class="filter-btn" onclick="setFilter('collaboration', this)">협업제안</button>
      <button class="filter-btn" onclick="setFilter('etc', this)">기타</button>
    </div>

    <div id="recordList"></div>
    </div><!-- /stt-section -->

    <div id="clt-section" style="display:none;">
      <div id="cltList"></div>
    </div>

  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p class="loading-msg">기록 불러오는 중...</p>
</div>

<script type="module">
  import { fetchConsultations, fetchCltConsultations } from './js/supabase.js';
  import { getConfig } from './js/config.js';
  import { CAT_COLORS } from './js/store.js';

  let allRecords = [];
  let currentFilter = 'all';

  let currentTab = 'stt';

  window.switchTab = async (tab) => {
    currentTab = tab;
    document.getElementById('tab-stt').classList.toggle('active', tab === 'stt');
    document.getElementById('tab-clt').classList.toggle('active', tab === 'clt');
    document.getElementById('stt-section').style.display = tab === 'stt' ? 'block' : 'none';
    document.getElementById('clt-section').style.display = tab === 'clt' ? 'block' : 'none';
    if (tab === 'clt' && document.getElementById('cltList').innerHTML === '') {
      try {
        const records = await fetchCltConsultations();
        renderCltRecords(records);
      } catch(e) {
        document.getElementById('cltList').innerHTML = `<div class="empty-state"><span class="emoji">❌</span>${e.message}</div>`;
      }
    }
  };

  function renderCltRecords(records) {
    const list = document.getElementById('cltList');
    if (records.length === 0) {
      list.innerHTML = `<div class="empty-state"><span class="emoji">📭</span>CLT 상담 기록이 없습니다.</div>`;
      return;
    }
    list.innerHTML = records.map((r, i) => `
      <div class="record-card">
        <div class="record-head" onclick="toggleClt(${i})">
          <div class="record-meta">
            <p class="record-name">${escHtml(r.name || '(이름 미입력)')}</p>
            <p class="record-org">${escHtml(r.org || '')}</p>
          </div>
          <span class="record-date">${r.timestamp || ''}</span>
          <span class="record-toggle" id="ctoggle-${i}">▼</span>
        </div>
        <div class="record-body" id="cbody-${i}">
          <div class="record-visitor">
            ${r.tel   ? `<span><strong>📞</strong> ${escHtml(r.tel)}</span>` : ''}
            ${r.email ? `<span><strong>✉️</strong> ${escHtml(r.email)}</span>` : ''}
            ${r.services ? `<span><strong>🏷</strong> ${escHtml(r.services)}</span>` : ''}
            ${r.keywords ? `<span><strong>🔑</strong> ${escHtml(r.keywords)}</span>` : ''}
          </div>
          ${r.detail ? `<div class="record-transcript">${escHtml(r.detail)}</div>` : ''}
        </div>
      </div>
    `).join('');
  }

  window.toggleClt = (i) => {
    document.getElementById(`cbody-${i}`).classList.toggle('open');
    document.getElementById(`ctoggle-${i}`).classList.toggle('open');
  };

  window.doLogin = async () => {
    const pw = document.getElementById('pwInput').value;
    let adminPw = '';
    try {
      const config = await getConfig();
      adminPw = config.admin_pw || '';
    } catch(e) {
      document.getElementById('loginErr').textContent = '설정 로딩 실패: ' + e.message;
      return;
    }
    if (!adminPw || pw !== adminPw) {
      document.getElementById('loginErr').textContent = '비밀번호가 틀렸습니다.';
      return;
    }
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('loadingOverlay').classList.add('show');
    try {
      allRecords = await fetchConsultations();
      renderRecords(allRecords);
      document.getElementById('mainScreen').style.display = 'block';
    } catch(e) {
      alert('기록 로딩 실패: ' + e.message);
      document.getElementById('loginScreen').style.display = 'flex';
    } finally {
      document.getElementById('loadingOverlay').classList.remove('show');
    }
  };

  window.setFilter = (cat, btn) => {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = cat === 'all' ? allRecords : allRecords.filter(r => r.category === cat);
    renderRecords(filtered);
  };

  function renderRecords(records) {
    const list = document.getElementById('recordList');
    document.getElementById('recordCount').textContent = `총 ${records.length}건`;

    if (records.length === 0) {
      list.innerHTML = `<div class="empty-state"><span class="emoji">📭</span>상담 기록이 없습니다.</div>`;
      return;
    }

    list.innerHTML = records.map((r, i) => {
      const v = r.visitor || {};
      const transcripts = r.transcripts || [];
      const name = v.name || '(이름 미입력)';
      const org  = v.org  || '';
      const color = CAT_COLORS[r.category] || 'var(--cat-5)';

      const visitorInfo = [
        v.contact && `<span><strong>📞</strong> ${v.contact}</span>`,
        v.email   && `<span><strong>✉️</strong> ${v.email}</span>`,
        v.org     && `<span><strong>🏢</strong> ${v.org}</span>`
      ].filter(Boolean).join('');

      const transcriptHTML = transcripts.length === 1
        ? `<div class="record-transcript">${escHtml(transcripts[0])}</div>`
        : transcripts.map((t, idx) => `
            <p class="record-round-label">${idx+1}회차</p>
            <div class="record-transcript">${escHtml(t)}</div>
          `).join('');

      return `
        <div class="record-card">
          <div class="record-head" onclick="toggleRecord(${i})">
            <span class="record-cat" style="background:${color}">${r.category === 'verification' ? '시험/검증' : r.category === 'consulting' ? '컨설팅' : r.category === 'development' ? '개발지원' : r.category === 'collaboration' ? '협업제안' : '기타'}</span>
            <div class="record-meta">
              <p class="record-name">${escHtml(name)}</p>
              ${org ? `<p class="record-org">${escHtml(org)}</p>` : ''}
            </div>
            <span class="record-date">${r.datetime || ''}</span>
            <span class="record-toggle" id="rtoggle-${i}">▼</span>
          </div>
          <div class="record-body" id="rbody-${i}">
            ${visitorInfo ? `<div class="record-visitor">${visitorInfo}</div>` : ''}
            ${transcriptHTML}
          </div>
        </div>
      `;
    }).join('');
  }

  window.toggleRecord = (i) => {
    document.getElementById(`rbody-${i}`).classList.toggle('open');
    document.getElementById(`rtoggle-${i}`).classList.toggle('open');
  };

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // 엔터키로 로그인
  document.getElementById('pwInput').focus();
</script>

</body>
</html>
